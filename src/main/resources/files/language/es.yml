display_name: "Adivina la construcción"

description:
  - "<dark_gray><strikethrough>----------------------------------------------</strikethrough></dark_gray>"
  - "<aqua>Juego</aqua> <gray>-</gray> <light_purple><bold>Adivina la construcción</bold></light_purple>"
  - " "
  - "<white>Descripción:</white>"
  - "<gray>Un jugador construye mientras los demás adivinan el tema.</gray>"
  - "<gray>Rota constructores y compite por conseguir más puntos.</gray>"
