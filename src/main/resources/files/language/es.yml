    guessed: "<aqua>Tema:</aqua> <green>{theme}</green> <dark_gray>•</dark_gray> <aqua>Estado:</aqua> <green>¡Adivinado!</green>"
    builder: "<aqua>Estás construyendo:</aqua> <green>{theme}</green> <dark_gray>•</dark_gray> <aqua>Tiempo:</aqua> <yellow>{time}</yellow>"
  correct_guess_broadcast: "<green><bold>✔</bold></green> <yellow>{player}</yellow> <gray>¡adivinó el tema!</gray>"
  correct_guess_points: "<green>+<yellow>{points}</yellow> puntos!</green>"
